name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
      - run: bun run typecheck
      - name: Run bench and capture output
        run: |
          mkdir -p docs/bench
          {
            echo "# deja recall bench — automated"
            echo ""
            echo "Regenerated by CI on every push to main."
            echo "Last run: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "Commit: ${GITHUB_SHA}"
            echo ""
            bun run bench/recall.ts
          } > docs/bench/latest.txt
      - name: Commit bench output if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain docs/bench/latest.txt)" ]]; then
            git add docs/bench/latest.txt
            git commit -m "ci: refresh bench/latest.txt [skip ci]"
            git push
          fi
